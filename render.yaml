services:
  - type: web
    name: nalam-api
    runtime: python
    plan: free
    rootDir: nalam
    buildCommand: pip install -r requirements.txt && cd ../knowledge_base && pip install -r requirements.txt && python build-index.py
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT backend:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GOOGLE_API_KEY
        sync: false   # paste your Google AI Studio API key in the Render dashboard
      - key: GEMMA_MODEL
        value: gemini-2.5-flash
      # CORS: the production Vercel origin is hardcoded in backend.py.
      # FLASK_ENV is intentionally NOT set here, so localhost origins are
      # disallowed in production. Set EXTRA_CORS_ORIGIN only if you add a
      # custom domain.
      # - key: EXTRA_CORS_ORIGIN
      #   value: https://your-custom-domain.example
